<title>Clientes</title>

<nav id="main-nav"></nav>

<div class="py-5">
  <div id="header-clientes">
    <div id="opcoes-cliente">
      <h3>Gerenciar clientes</h3>
      <a href="/cadastrar">
        <button class="botao-prototipo">+ Novo cliente</button>
      </a>
    </div>

    <form id="filtro-clientes">
      <div id="campos-filtro-clientes">

        <label>
          Nome
          <input placeholder="Nome" name="nome"></input>
        </label>

        <label>
          Gênero
          <select name="genero">
            <option></option>
            <option value="MASCULINO">Masculino</option>
            <option value="FEMININO">Feminino</option>
            <option value="OUTRO">Outro</option>
          </select>
        </label>
        
        <label>
          Data nascimento
          <input type="date" name="dataNascimento">
        </label>
        
        <label>
          CPF
          <input placeholder="111.111.111-11" name="cpf">
        </label>
        
        <label>
          E-mail
          <input type="email" placeholder="email@email.com" name="email">
        </label>
        

        <label>
          Ranking
          <input type="number" placeholder="4" name="ranking">
        </label>
        

        <label>
          Status cadastro
          <select name="isAtivo">
            <option value="">Todos</option>
            <option value=true>Ativo</option>
            <option value=false>Inativo</option>
          </select>
        </label>
        
      </div>

      <button type="button" id="botao-pesquisar-clientes">
        Pesquisar
      </button>
    </form>
  </div>

  <div id="container-tabela-clientes"></div>
</div>

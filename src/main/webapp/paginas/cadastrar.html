<title>Cadastro</title>

<nav id="main-nav"></nav>

<main id="cadastrar-cliente">
    <div id="container-cadastrar-cliente">
        <section id="secao-dados-pessoais"></section>

        <section id="secao-enderecos">
            <p>Endereços</p> 

            <div id="container-enderecos"></div>

            <div class="footer-secao-endereco">
                <button type="button" class="btn-adicionar-endereco">
                    + Novo Endereço
                </button>

                <p class="aviso">
                    Observações: Deve haver ao menos 1 endereço de
                    residência, um de entrega e um de cobrança
                </p>
            </div>
        </section>
        
        <section id="secao-cartoes-credito">
            <p>Cartões de Crédito</p>

            <div id="container-cartao-credito"></div>
            
            <div id="footer-secao-cartao-credito">
                <button type="button" class="btn-adicionar-cartao">
                    + Novo Cartão de Crédito
                </button>
            </div>
        </section>
    </div>

    <button
        type="button"
        id="botao-enviar-cadastro"
        class="botao-salvar"
    >
        Salvar cliente
    </button>
</main>

<footer id="main-footer"></footer>

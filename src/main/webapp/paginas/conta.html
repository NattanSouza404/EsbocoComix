<title>Conta</title>

<nav id="main-nav"></nav>

<h3 class="text-center">Minha Conta</h3>

<div id="container-conta" class="py-5">
    <div id="nav-lateral" class="d-flex flex-column align-items-start"></div>

    <div id="secoes-conta">

        <section id="secao-dados-pessoais">
            <div class="container"></div>

            <div>
                <button
                    id="btn-editar-cadastro"
                    type="button"
                    class="btn btn-primary btn-sm btn-primary btn-lg"
                    data-bs-toggle="modal"
                    data-bs-target="#modal-alterar-dados-pessoais"
                >
                    Editar Cadastro
                </button>

                <button
                    id="btn-alterar-senha"
                    type="button"
                    class="btn btn-primary btn-sm btn-primary btn-lg" 
                    data-bs-toggle="modal"
                    data-bs-target="#modal-alterar-senha"
                >
                    Alterar Senha
                </button>
            </div>
        </section>

        <section id="secao-endereco">
            <div class="container-endereco"></div>
            <div>
                <button
                    id="btn-adicionar-endereco"
                    type="button"
                    class="btn btn-primary btn-sm btn-primary btn-lg"
                    data-bs-toggle="modal"
                    data-bs-target="#modal-adicionar-endereco"
                >
                    Adicionar Endereço
                </button>
            </div>
        </section>

        <section id="secao-cartao-credito">
            <div class="container-cartoes"></div>

            <div>
                <button
                    id="btn-adicionar-cartao"
                    type="button"
                    class="btn btn-primary btn-sm btn-primary btn-lg"
                    data-bs-toggle="modal"
                    data-bs-target="#modal-adicionar-cartao-credito"
                >
                    Adicionar Cartão de crédito
                </button>
            </div>       
        </section>

        <section id="secao-cupons">
            <div class="container-cupom"></div>
        </section>

    </div>
</div>

<footer id="main-footer"></footer>

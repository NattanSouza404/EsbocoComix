<title>Inicial</title>

<nav id="main-nav"></nav>

<!-- Hero Section -->
<header class="text-white text-center">
    <div id="container-carrossel" class="container-fluid g-5 py-3"></div>
</header>

<div class="container">
  <div class="row">

    <div class="col-md-3">
      <div class="container mt-4">
        <form id="busca-quadrinhos">
          <div class="d-flex align-items-center mb-3">
            <label class="form-label me-2">
              Titulo:
              <input
                type="text"
                name="titulo"
                class="form-control"
                placeholder="O Homem-Cão"
              >
            </label>
          </div>

          <div class="d-flex align-items-center mb-3">
            <label class="form-label me-2">
              Grupo de precificação:
              <select name="grupoPrecificacao" class="form-control">
                <option></option>
                <option>Colecionador</option>
                <option>Premium</option>
                <option>Padrão</option>
                <option>Promoção</option>
              </select>
            </label>
          </div>

          <div class="d-flex align-items-center mb-3">
            <fieldset id="fieldset-categorias" class="d-flex flex-wrap">
              <legend>Categorias</legend>
            </fieldset>
          </div>
          
          <div class="d-flex align-items-center mb-3">
            <label class="form-label me-2">
              Autor:
              <input
                type="text"
                name="autor"
                class="form-control"
                placeholder="Dav Pikey"
              >
            </label>
          </div>

          <div class="d-flex align-items-center mb-3">
            <label class="form-label me-2">
              Ano:
              <input
                type="number"
                name="ano"
                class="form-control"
                placeholder="2000"
              >
            </label>
          </div>

          <div class="d-flex align-items-center mb-3">
            <label class="form-label me-2">
              Edição:
              <input
                type="number"
                name="edicao"
                class="form-control"
                placeholder="1"
              >
            </label>
          </div>

          <div class="d-flex align-items-center mb-3">
            <label class="form-label me-2">
              Editora:
              <input
                type="text"
                name="editora"
                class="form-control"
                placeholder="Companhia das Letras"
              >
            </label>
          </div>

          <div id="input-maximo-paginas"></div>

          <div class="d-flex align-items-center mb-3">
            <label class="form-label me-2">
              Dimensões:
              <input
                type="number"
                name="altura"
                class="form-control"
                placeholder="Altura"
              >
              <input
                type="number"
                name="largura"
                class="form-control"
                placeholder="Largura"
              >
              <input
                type="number"
                name="profundidade"
                class="form-control"
                placeholder="Profundidade"
              >
              <input
                type="number"
                name="peso"
                class="form-control"
                placeholder="Peso"
              >
            </label>
          </div>

          <div class="d-flex align-items-center mb-3">
            <label class="form-label me-2">
              Código de Barras:
              <input
                type="text"
                name="codigoBarras"
                class="form-control"
                placeholder="1111111111111"
              >
            </label>
          </div>

          <div class="d-flex align-items-center mb-3">
            <label class="form-label me-2">
              ISBN:
              <input
                type="text"
                name="isbn"
                class="form-control" 
                placeholder="1112223334445"
              >
            </label>
          </div>

          <!-- Button -->
          <div class="text-center mt-3">
            <button
              id="btn-buscar-quadrinho"
              type="button"
              class="btn btn-primary btn-lg"
            >
              Buscar
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="container-produtos" class="row col-md-9"></div>

  </div>
</div>

<footer id="main-footer"></footer>
